x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  sso-app:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    environment:
      DB_HOST: sso-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - sso_vendor:/var/www/html/vendor
    depends_on:
      sso-db:
        condition: service_healthy
      sso-vite:
        condition: service_started
    expose:
      - "9000"
    networks:
      - sso-internal
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

  sso-vite:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./src:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - sso-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

  sso-nginx:
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sso.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.sso.entrypoints=websecure"
      - "traefik.http.routers.sso.tls=true"
      - "traefik.http.services.sso.loadbalancer.server.port=80"
    depends_on:
      sso-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/80'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sso-internal
      - web
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  sso-db:
    image: mysql:8
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - sso_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sso-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

networks:
  sso-internal:
    driver: bridge
  web:
    external: true
  microservices:
    external: true

volumes:
  sso_db_data:
  sso_vendor:
