apiVersion: v1
kind: ConfigMap
metadata:
  name: sso-config
  namespace: portfolio
  labels:
    app.kubernetes.io/name: sso
    app.kubernetes.io/part-of: portfolio
data:
  APP_NAME: "SSO"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://sso.portfolio.kube"
  LOG_CHANNEL: "stderr"
  DB_CONNECTION: "mysql"
  DB_HOST: "sso-mysql"
  DB_PORT: "3306"
  # Users service configuration
  USERS_SERVICE_URL: "http://users"
  USERS_SERVICE_API_KEY: "internal-api-key-change-in-production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sso-nginx-config
  namespace: portfolio
  labels:
    app.kubernetes.io/name: sso
    app.kubernetes.io/component: nginx
    app.kubernetes.io/part-of: portfolio
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
